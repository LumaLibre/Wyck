name: Publish Snapshot
on:
  push:
    branches:
      - main
      - "experimental/**"
      - "snapshot/**"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish API
        run: "./gradlew :bundle:publish -Psnapshot"
        env:
          REPO_URL: "https://repo.wyck.dev/snapshots"
          REPO_USERNAME: ${{ secrets.WYCK_USERNAME }}
          REPO_PASSWORD: ${{ secrets.WYCK_PASSWORD }}

