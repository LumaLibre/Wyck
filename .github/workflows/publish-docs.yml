name: Deploy docs to GitHub Pages

on:
  workflow_run:
    workflows: ["Publish Snapshot", "Publish"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository using git
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate API javadoc
        run: "./gradlew :api:javadoc -Psnapshot"

      - name: Copy javadoc into Astro public dir
        run: |
          rm -rf docs/public/javadoc
          mkdir -p docs/public/javadoc
          cp -r api/build/docs/javadoc/. docs/public/javadoc/

      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5